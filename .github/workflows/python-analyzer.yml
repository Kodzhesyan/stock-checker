name: Python Stock Analyzer

on:
  # 1. ЗАПУСК ПО РАСПИСАНИЮ
  schedule:
    # Запуск в 22:00 (UTC) с понедельника по пятницу (после закрытия рынков)
    - cron: '0 22 * * 1-5'
    
  # 2. РУЧНОЙ ЗАПУСК
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Тикеры для анализа (ЧЕРЕЗ ПРОБЕЛ)'
        required: false
        default: 'AAPL MSFT GOOGL AMZN NVDA META TSLA'

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Скачивание кода репозитория
        uses: actions/checkout@v4

      - name: Установка менеджера пакетов uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Запуск скрипта и сохранение в JSON
        run: |
          # Проверяем: если тикеры переданы вручную, берем их. Если нет (запуск по расписанию) - берем дефолтные.
          TICKERS="${{ github.event.inputs.tickers }}"
          if [ -z "$TICKERS" ]; then
            TICKERS="AAPL MSFT GOOGL AMZN NVDA META TSLA"
          fi
          
          echo "Анализируем тикеры: $TICKERS"
          
          # Запускаем скрипт
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py $TICKERS --output json > result.json
          cat result.json 

      - name: Отправка данных на вебхук n8n
        env:
          # Замените на вашу прямую ссылку или оставьте секрет, если починили его
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @result.json \
               $WEBHOOK_URL

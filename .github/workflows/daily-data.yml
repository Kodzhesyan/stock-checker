name: Daily stock data

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  

on:
  schedule:
    - cron: "0 23 * * *" # Run ~2 hours after U.S. market close
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun src/index.ts predict --ticker="AAPL,MSFT,GOOGL,AMZN,NVDA,META,TSLA" --sort=asc
      - name: Pull latest changes before commit
        run: git pull --rebase origin main
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily stock data update"
          file_pattern: public/*.csv
          

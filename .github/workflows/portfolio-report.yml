name: Official Portfolio Analysis

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Reconstruct Portfolio
        run: |
          # Создаем портфель и наполняем его
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # Проверяем, что портфель виден системе
          uv run .agent/skills/stock-analysis/scripts/portfolio.py list

      - name: Portfolio Deep Analysis
        run: |
          # Запускаем анализ конкретного портфеля с выводом в JSON
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio "My Portfolio" --output json > full_portfolio_report.json
          
          # Выведем в логи, чтобы убедиться, что P&L посчитан
          cat full_portfolio_report.json

      - name: Send Deep Analysis to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @full_portfolio_report.json \
               $WEBHOOK_URL

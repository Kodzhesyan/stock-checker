name: Official Portfolio Analysis

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Reconstruct Portfolio
        run: |
          # Создаем портфель и наполняем его
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # Проверяем, что портфель виден системе
          uv run .agent/skills/stock-analysis/scripts/portfolio.py list

      - name: Get Portfolio P&L Table
        run: |
          # Генерируем текстовую таблицу портфеля
          uv run .agent/skills/stock-analysis/scripts/portfolio.py show --portfolio "My Portfolio" > portfolio_table.txt
          
          # Посмотрим, что получилось в логах
          cat portfolio_table.txt

      - name: Send Table to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Запаковываем текст таблицы в JSON с помощью jq
          TABLE_JSON=$(jq -n --arg msg "$(cat portfolio_table.txt)" '{"report_type": "pnl_table", "table": $msg}')
          
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "$TABLE_JSON" \
               $WEBHOOK_URL

      

name: Official Portfolio Analysis

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Reconstruct Portfolio Database
        run: |
          # 1. Создаем портфель (обязательный первый шаг)
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          
          # 2. Добавляем ваши активы (используем ваши 36 акций VOO)
          # Замените 505.20 на вашу реальную цену покупки (среднюю цену)
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # Пример добавления крипты (BTC-USD)
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add BTC-USD --quantity 0.05 --cost 45000 --portfolio "My Portfolio"
          
          # 3. Проверка: выводим таблицу портфеля в логи GitHub для контроля
          uv run .agent/skills/stock-analysis/scripts/portfolio.py show --portfolio "My Portfolio"

      - name: Deep Analysis & Export to JSON
        run: |
          # Теперь запускаем мощный анализ всего портфеля
          # Флаг --output json позволит n8n легко прочитать данные
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio "My Portfolio" --output json > portfolio_full_report.json
          
          # Посмотрим на структуру в логах
          cat portfolio_full_report.json

      - name: Webhook to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Отправляем файл с полным анализом (сигналы + P&L) в n8n
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @portfolio_full_report.json \
               $WEBHOOK_URL
      - name: Send to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @portfolio_report.json \
               $WEBHOOK_URL

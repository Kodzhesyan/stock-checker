name: Official Portfolio Analysis

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Reconstruct Portfolio
        run: |
          # Создаем портфель и наполняем его
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # Проверяем, что портфель виден системе
          uv run .agent/skills/stock-analysis/scripts/portfolio.py list

        run: |
          # Запускаем анализ. Мы используем команду analyze_stock.py с флагом --portfolio.
          # ВАЖНО: используем одно и то же имя файла везде.
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio "My Portfolio" --output json > report.json
          
          # ПРОВЕРКА 1: Существует ли файл?
          if [ ! -f report.json ]; then
            echo "❌ ОШИБКА: Файл report.json не был создан!"
            exit 1
          fi
          
          # ПРОВЕРКА 2: Не пустой ли он?
          if [ ! -s report.json ]; then
            echo "❌ ОШИБКА: Файл report.json пуст!"
            exit 1
          fi
          
          echo "✅ Анализ завершен, файл готов к отправке."
          cat report.json

      - name: Send to n8n Webhook
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Отправляем файл report.json
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @report.json \
               $WEBHOOK_URL

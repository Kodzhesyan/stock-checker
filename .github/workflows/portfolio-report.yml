name: Personal Portfolio Report

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  portfolio-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Create portfolio file from secret
        env:
          PORTFOLIO_DATA: ${{ secrets.PORTFOLIO_JSON_DATA }}
        run: |
          # Создаем структуру папок, которую ожидает агент
          mkdir -p data/config
          
          # Записываем данные в файл (убираем точку в начале имени)
          echo "$PORTFOLIO_DATA" > data/config/portfolio.json
          
          # На всякий случай создадим и в корне, если он ищет там
          echo "$PORTFOLIO_DATA" > .portfolio.json

      - name: Get Portfolio List
        run: |
          # Запускаем команду list
          uv run .agent/skills/stock-analysis/scripts/portfolio.py list > report.txt
          
          # Проверяем вывод в логах GitHub
          cat report.txt

      - name: Send Report to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Читаем текст и отправляем в n8n
          # Используем jq для безопасной упаковки текста в JSON (чтобы кавычки не ломали curl)
          REPORT_TEXT=$(cat report.txt)
          jq -n --arg msg "$REPORT_TEXT" '{"report": $msg}' | \
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @- \
               $WEBHOOK_URL

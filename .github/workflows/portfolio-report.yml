name: Official Portfolio Analysis

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Reconstruct Portfolio
        run: |
          # Создаем портфель и наполняем его
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # Проверяем, что портфель виден системе
          uv run .agent/skills/stock-analysis/scripts/portfolio.py list

      - name: Deep Analysis & Export
        id: analysis
        run: |
          # Запускаем анализ. ВАЖНО: имя файла должно быть portfolio_report.json
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio "My Portfolio" --output json > portfolio_report.json
          
          # ПРОВЕРКА: Если файл пустой, выводим содержимое папки для отладки
          if [ ! -s portfolio_report.json ]; then
            echo "❌ Файл portfolio_report.json не найден или пуст!"
            ls -la
            exit 1
          fi
          cat portfolio_report.json

      - name: Send Report to n8n
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Теперь файл точно существует
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @portfolio_report.json \
               $WEBHOOK_URL

name: Monthly Portfolio Report

on:
  workflow_dispatch: # Запуск вручную кнопкой
  schedule:
    - cron: '0 21 1 * *' # Запуск 1-го числа каждого месяца

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Build and Analyze
        run: |
          # 1. Создаем портфель в памяти
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          
          # 2. Добавляем ваши 36 акций VOO (укажите свою цену покупки в --cost)
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # 3. Запускаем глубокий анализ за МЕСЯЦ в формате JSON
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py -p "My Portfolio" --period monthly --output json > report.json

      - name: Send to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" -d @report.json $WEBHOOK_URL

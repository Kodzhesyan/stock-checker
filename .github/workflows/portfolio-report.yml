name: Personal Portfolio Report

on:
  schedule:
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  portfolio-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Create portfolio file from secret
        env:
          PORTFOLIO_DATA: ${{ secrets.PORTFOLIO_JSON_DATA }}
        run: |
          # Скрипт ищет файл именно с таким именем в корне
          echo "$PORTFOLIO_DATA" > .portfolio.json

      - name: Get Portfolio List
        id: portfolio_step
        run: |
          # Запускаем просто команду list без лишних флагов
          # Сохраняем вывод в файл report.txt
          uv run .agent/skills/stock-analysis/scripts/portfolio.py list > report.txt
          
          # Выводим в лог для проверки
          cat report.txt

      - name: Send Report to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Читаем текст из файла и отправляем его как значение "report" в JSON
          REPORT_TEXT=$(cat report.txt)
          curl -X POST \
               -H "Content-Type: application/json" \
               -d "{\"report\": \"$REPORT_TEXT\"}" \
               $WEBHOOK_URL

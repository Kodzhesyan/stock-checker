name: Portfolio Analysis v5.0 (P&L + n8n)

on:
  schedule:
    # Запуск по будням в 22:30 (после закрытия биржи в США)
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # Позволяет запускать вручную кнопкой в GitHub

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true # Ускоряет запуск в 10 раз

      - name: Reconstruct Portfolio Database
        run: |
          # 1. Создаем портфель "My Portfolio"
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          
          # 2. Добавляем ваши активы (команды 'add' сохраняют их во внутреннюю БД)
          # Используем ваши 36 акций VOO и...
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 610.23 --portfolio "My Portfolio"
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add GOOG --quantity 1 --cost 334.16 --portfolio "My Portfolio"
          
          
          # 3. Проверяем в логах, что портфель собран верно
          uv run .agent/skills/stock-analysis/scripts/portfolio.py show --portfolio "My Portfolio"

      - name: Deep Analysis & Generate JSON
        id: analysis
        run: |
          # Запускаем анализ конкретного портфеля. 
          # Флаг --output json гарантирует, что n8n получит структурированные данные.
          # Флаг --period weekly добавит отчет за последнюю неделю.
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio "My Portfolio" --period weekly --output json > report.json
          
          # ПРОВЕРКА: Если файл пустой или не создан, Workflow прервется с ошибкой
          if [ ! -s report.json ]; then
            echo "❌ ОШИБКА: Файл report.json не создан или пуст!"
            exit 1
          fi
          
          # Выводим JSON в логи GitHub для отладки
          cat report.json

      - name: Send Report to n8n Webhook
        if: success() # Выполнять только если анализ прошел успешно
        env:
          # Убедитесь, что в Settings -> Secrets -> Actions добавлен секрет SLACK_WEBHOOK_URL
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Отправляем файл report.json в n8n на ваш сервер Contabo
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @report.json \
               $WEBHOOK_URL

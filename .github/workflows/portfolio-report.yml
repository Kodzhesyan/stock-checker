name: Portfolio Analysis v5.0 (P&L + n8n)

on:
  schedule:
    # Запуск по будням в 22:30 (после закрытия биржи в США)
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # Позволяет запускать вручную кнопкой в GitHub

jobs:
  analyze-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true # Ускоряет запуск в 10 раз

      - name: Analysis from File
        run: |
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --file portfolio.json --output json > report.json
          
      - name: Send Report to n8n Webhook
        if: success() # Выполнять только если анализ прошел успешно
        env:
          # Убедитесь, что в Settings -> Secrets -> Actions добавлен секрет SLACK_WEBHOOK_URL
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Отправляем файл report.json в n8n на ваш сервер Contabo
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @report.json \
               $WEBHOOK_URL

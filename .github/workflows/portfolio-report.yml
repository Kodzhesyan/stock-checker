name: Official Portfolio Analysis

on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  analyze-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Inject Portfolio Data
        env:
          # ВАЖНО: Ваш JSON в секретах должен быть оформлен как словарь с именами портфелей
          # Пример: { "My Portfolio": { "positions": [...] } }
          PORTFOLIO_DATA: ${{ secrets.PORTFOLIO_JSON_DATA }}
        run: |
          # Создаем официальный путь для хранения портфелей
          mkdir -p ~/.clawdbot/skills/stock-analysis/
          
          # Записываем данные в файл, который ожидает скрипт
          echo "$PORTFOLIO_DATA" > ~/.clawdbot/skills/stock-analysis/portfolios.json

      - name: Run Official Portfolio Analysis
        run: |
          # Теперь мы передаем ПУТЬ к файлу, а не название портфеля
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio .portfolio.json --output json > portfolio_report.json
          
          cat portfolio_report.json

      - name: Send to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST \
               -H "Content-Type: application/json" \
               -d @portfolio_report.json \
               $WEBHOOK_URL

name: Simple Portfolio Report

on:
  workflow_dispatch: # Запуск кнопкой
  schedule:
    - cron: '30 22 * * 1-5'

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Analyze My Stocks
        run: |
          # 1. Сначала просто создаем портфель в памяти (одна строка)
          uv run .agent/skills/stock-analysis/scripts/portfolio.py create "My Portfolio"
          
          # 2. Добавляем ваши 36 акций VOO (одна строка)
          uv run .agent/skills/stock-analysis/scripts/portfolio.py add VOO --quantity 36 --cost 505.20 --portfolio "My Portfolio"
          
          # 3. Запускаем анализ и сохраняем в JSON (одна строка)
          uv run .agent/skills/stock-analysis/scripts/analyze_stock.py --portfolio "My Portfolio" --output json > report.json

      - name: Send to n8n
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H "Content-Type: application/json" -d @report.json $WEBHOOK_URL
